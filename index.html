
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden WiFi - Pay & Connect</title>
<style>
  body { background: #000; color: #fff; font-family: Arial; text-align: center; padding: 20px; margin: 0; }
  
  /* Maandishi yakizunguka juu */
  .marquee {
    background: linear-gradient(90deg, #FFD700, #00C3FF);
    color: #000;
    padding: 10px;
    font-weight: bold;
    font-size: 16px;
    white-space: nowrap;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
  }
  .marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 15s linear infinite;
  }
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  .card { 
    background: #111; 
    border: 2px solid #FFD700; 
    border-radius: 15px; 
    padding: 20px; 
    max-width: 400px; 
    margin: 70px auto 20px; 
  }
  
  input { 
    width: 90%; 
    padding: 12px; 
    margin: 10px 0; 
    border-radius: 8px; 
    border: 1px solid #333; 
    background: #222; 
    color: #FFD700; 
    font-size: 16px; 
  }
  
  /* Package buttons */
  .packages {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 15px 0;
  }
  .pkg-btn {
    background: #222;
    border: 2px solid #FFD700;
    color: #FFD700;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
  }
  .pkg-btn.active {
    background: linear-gradient(90deg, #00C3FF, #FFD700);
    color: #000;
  }
  
  .pay-btn { 
    width: 95%; 
    padding: 14px; 
    margin: 15px 0 8px; 
    border: none; 
    border-radius: 8px; 
    font-weight: bold; 
    font-size: 16px; 
    cursor: pointer;
    background: linear-gradient(90deg, #00C3FF, #FFD700); 
    color: #000; 
  }
  
  .error { background: #ff0000; color: #fff; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
  .success { background: #00ff00; color: #000; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
</style>
</head>
<body>

<!-- Maandishi yakizunguka juu -->
<div class="marquee">
  <span>BETTER WIFI BETTER FOR LIFE WE GROW TOGETHER • BETTER WIFI BETTER FOR LIFE WE GROW TOGETHER • </span>
</div>

<div class="card">
  <h2>📶 GOLDEN WiFi</h2>
  <p>Pay & Connect - Fast Internet</p>
  
  <h3>Select Package:</h3>
  <div class="packages">
    <button class="pkg-btn active" data-amount="20" data-name="1 Hour">1 Hour<br>KES 20</button>
    <button class="pkg-btn" data-amount="50" data-name="3 Days">3 Days<br>KES 50</button>
    <button class="pkg-btn" data-amount="100" data-name="7 Days">7 Days<br>KES 100</button>
    <button class="pkg-btn" data-amount="200" data-name="30 Days">30 Days<br>KES 200</button>
  </div>
  
  <input type="tel" id="phone" placeholder="Enter M-Pesa Number: 07XXXXXXXX" maxlength="10">
  
  <button class="pay-btn" id="payBtn">PAY KES 50 NOW</button>
  
  <div id="errorBox" class="error"></div>
  <div id="successBox" class="success"></div>
</div>

<script>
let selectedAmount = 50;
let selectedPackage = "3 Days";

const pkgButtons = document.querySelectorAll('.pkg-btn');
const payBtn = document.getElementById('payBtn');

pkgButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    pkgButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedAmount = btn.dataset.amount;
    selectedPackage = btn.dataset.name;
    payBtn.innerText = `PAY KES ${selectedAmount} NOW`;
  });
});

function showError(msg) {
  document.getElementById('errorBox').innerText = msg;
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('successBox').style.display = 'none';
  setTimeout(() => { document.getElementById('errorBox').style.display = 'none'; }, 4000);
}

function showSuccess(msg) {
  document.getElementById('successBox').innerText = msg;
  document.getElementById('successBox').style.display = 'block';
  document.getElementById('errorBox').style.display = 'none';
}

function validatePhone(phone) {
  phone = phone.replace(/\s/g, '');
  return /^07\d{8}$/.test(phone);
}

function formatPhone(phone) {
  return phone.replace(/^0/, '254');
}

async function payNow() {
  let phone = document.getElementById('phone').value.trim();
  
  if (phone === '') {
    showError('Error: Please enter your M-Pesa number');
    return;
  }
  
  if (!validatePhone(phone)) {
    showError('Error: Enter valid M-Pesa number. Format: 07XXXXXXXX');
    return;
  }
  
  let formattedPhone = formatPhone(phone);
  showSuccess(`Sending STK Push to ${phone} for ${selectedPackage}...`);
  
  try {
    const res = await fetch('/api/stk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        phone: formattedPhone, 
        amount: selectedAmount,
        package: selectedPackage
      })
    });
    
    const data = await res.json();
    
    if (data.ResponseCode === '0') {
      showSuccess('STK Push sent! Check your phone and enter M-Pesa PIN');
    } else {
      showError('Error: ' + data.errorMessage);
    }
    
  } catch (err) {
    showError('Error: Failed to connect. Try again');
  }
}

payBtn.addEventListener('click', payNow);
</script>
</body>
</html>
